target-version = "py311"
line-length = 88

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8 naming
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long — handled by formatter
]

[lint.per-file-ignores]
"*/migrations/*" = ["E501", "F401"]
"*/settings/*.py" = ["F403", "F405"]

[format]
quote-style = "double"
indent-style = "space"
